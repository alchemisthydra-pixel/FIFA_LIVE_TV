<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA-LIVE-TV</title>
    <style>
        /* Base Reset & Variables */
        :root {
            /* Light Theme */
            --bg-body: #f8fafc;
            --bg-container: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #ffcc00;
            --accent-hover: #ffaa00;
            --accent-gradient: linear-gradient(135deg, #ffd700, #ff8c00, #ffcc00);
            --card-bg: #f1f5f9;
            --border: #e2e8f0;
            --shadow: rgba(15, 23, 42, 0.08);
            --live-bg: #ef4444;
            --channel-bg: #f8fafc;
            --channel-text: #334155;
            --active-bg: #ffcc00;
            --active-text: #0f172a;
        }

        [data-theme="dark"] {
            /* Dark Theme - Premium Night Mode */
            --bg-body: #0a0f1c;
            --bg-container: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #ffcc00;
            --accent-hover: #ffaa00;
            --accent-gradient: linear-gradient(135deg, #ffd700, #ff8c00, #ffcc00);
            --card-bg: #1e2937;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.7);
            --live-bg: #f87171;
            --channel-bg: #1f2937;
            --channel-text: #e2e8f0;
            --active-bg: #ffcc00;
            --active-text: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .tv-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-container);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 25px 50px var(--shadow);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .live-badge {
            background-color: var(--live-bg);
            color: white;
            font-size: 13px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .theme-switcher {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            padding: 6px;
            border-radius: 9999px;
            border: 1px solid var(--border);
        }

        .theme-option {
            padding: 7px 16px;
            border-radius: 9999px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
        }

        .theme-option.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }

        .video-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            margin-bottom: 32px;
            border: 2px solid var(--border);
            box-shadow: 0 15px 35px var(--shadow);
        }

        video { width: 100%; height: 100%; display: block; }

        .section-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--border);
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        /* === NEW BUTTON STYLE inspired by your example === */
        .channel-btn {
            position: relative;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ffcc00 100%);
            color: #0f172a;
            font-weight: 700;
            font-size: 15px;
            padding: 20px 16px;
            border-radius: 12px;
            border: 3px solid #ffffff;
            box-shadow: 
                0 8px 20px rgba(255, 180, 0, 0.6),
                inset 0 2px 4px rgba(255,255,255,0.8),
                inset 0 -4px 6px rgba(0,0,0,0.2);
            cursor: pointer;
            overflow: hidden;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .channel-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 200%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.9),
                transparent
            );
            transform: skewX(-25deg);
            animation: shine 4s infinite;
            opacity: 0.6;
        }

        @keyframes shine {
            0% { transform: translateX(-150%) skewX(-25deg); }
            20% { transform: translateX(300%) skewX(-25deg); }
            100% { transform: translateX(300%) skewX(-25deg); }
        }

        .channel-btn:hover {
            transform: translateY(-6px) scale(1.04);
            box-shadow: 
                0 15px 35px rgba(255, 140, 0, 0.7),
                inset 0 2px 4px rgba(255,255,255,0.9);
        }

        .channel-btn.active {
            background: linear-gradient(135deg, #ffdd00 0%, #ff9900 50%, #ffcc00 100%);
            box-shadow: 
                0 0 35px rgba(255, 200, 0, 0.9),
                0 8px 20px rgba(255, 140, 0, 0.8),
                inset 0 2px 6px rgba(255,255,255,0.9);
            border-color: #ffffff;
        }

        /* Football Click Animation */
        .football-animation {
            position: absolute;
            font-size: 28px;
            opacity: 0;
            pointer-events: none;
            animation: footballKick 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes footballKick {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            40% { transform: scale(1.2) rotate(180deg); }
            70% { transform: scale(1) rotate(360deg); }
            100% { transform: translateY(-80px) scale(0.6) rotate(720deg); opacity: 0; }
        }

        /* Glow Pulse on Click */
        .glow-pulse {
            animation: glowPulse 0.6s ease-out;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 200, 0, 0.9); }
            70% { box-shadow: 0 0 0 30px rgba(255, 200, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 200, 0, 0); }
        }

        .notice-box {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13.8px;
            line-height: 1.65;
            max-width: 640px;
            margin: 0 auto;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="tv-container">
        <div class="header">
            <div class="header-left">
                <span class="logo">FIFA_LIVE_TV</span>
                <span class="live-badge">LIVE</span>
            </div>
            
            <div class="theme-switcher">
                <div class="theme-option" data-theme-mode="light">☀️ Light</div>
                <div class="theme-option active" data-theme-mode="dark">🌙 Dark</div>
                <div class="theme-option" data-theme-mode="auto">⏱ Auto</div>
            </div>
        </div>

        <div class="video-wrapper">
            <video id="main-player" controls autoplay muted>
                <source id="video-source" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>
        </div>

        <h3 class="section-title">চ্যানেল সমূহ</h3>
        <div class="channel-grid" id="channel-grid">
            <!-- Buttons populated via JS for animation support -->
        </div>

        <div class="notice-box">
            This TV channel is exclusively for BD FIFA members. Please do not share this stream or website outside the community. Thank you for your cooperation.
        </div>
    </div>

    <script>
        // Theme Management
        const body = document.body;
        const themeOptions = document.querySelectorAll('.theme-option');

        function setTheme(mode) {
            if (mode === 'auto') {
                const hour = new Date().getHours();
                body.setAttribute('data-theme', hour >= 6 && hour < 20 ? 'light' : 'dark');
            } else {
                body.setAttribute('data-theme', mode);
            }
            themeOptions.forEach(opt => {
                opt.classList.toggle('active', opt.getAttribute('data-theme-mode') === mode);
            });
        }

        themeOptions.forEach(option => {
            option.addEventListener('click', () => {
                const mode = option.getAttribute('data-theme-mode');
                setTheme(mode);
                localStorage.setItem('hscThemeMode', mode);
            });
        });

        function initTheme() {
            const saved = localStorage.getItem('hscThemeMode') || 'auto';
            setTheme(saved);
        }

        // Channel Data
        const channels = [
            { name: "Toffee Server 1", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
            { name: "Extreme 1 (4K)", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" },
            { name: "Fox One 1 (Alt)", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
            { name: "WC TV", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" },
            { name: "W Sports", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4" },
            { name: "beIN XTRA", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" }
        ];

        const grid = document.getElementById('channel-grid');
        const player = document.getElementById('main-player');
        const videoSource = document.getElementById('video-source');

        channels.forEach((ch, index) => {
            const btn = document.createElement('button');
            btn.className = `channel-btn ${index === 1 ? 'active' : ''}`;
            btn.textContent = ch.name;
            btn.dataset.video = ch.src;

            btn.addEventListener('click', function() {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active', 'glow-pulse'));
                this.classList.add('active', 'glow-pulse');

                const football = document.createElement('div');
                football.className = 'football-animation';
                football.textContent = '⚽';
                football.style.left = `${Math.random() * 60 + 20}%`;
                football.style.top = '40%';
                this.appendChild(football);

                setTimeout(() => football.remove(), 900);

                videoSource.src = this.dataset.video;
                player.load();
                player.play();
            });

            grid.appendChild(btn);
        });

        window.onload = initTheme;
    </script>
</body>
</html>
