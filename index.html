<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <titlae>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Card */
        .tv-container {
            width: 100%;
            max-width: 1000px;
            background-color: #0d1321;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Header Setup */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-right: 10px;
        }

        .live-badge {
            background-color: #ff3b30;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Video Player Wrapper */
        .video-wrapper {
            width: 100%;
            background-color: #000000;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            margin-bottom: 30px;
            border: 1px solid #1e293b;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Section Title */
        .section-title {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 15px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 8px;
        }

        /* Channel Grid Layout */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        /* Channel Buttons */
        .channel-btn {
            background-color: #1a2333;
            color: #e2e8f0;
            border: none;
            padding: 16px 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .channel-btn:hover {
            background-color: #243249;
            transform: translateY(-2px);
        }

        /* Active Green State matching your screenshot */
        .channel-btn.active {
            background-color: #00ff87;
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.4);
        }

        /* Notice Box Style */
        .notice-box {
            background-color: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            color: #f87171;
            font-size: 13px;
            line-height: 1.5;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="tv-container">
        <div class="header">
            <span class="logo">HSC_26 TV</span>
            <span class="live-badge">Live</span>
        </div>

        <div class="video-wrapper">
            <video id="main-player" controls autoplay muted>
                <source id="video-source" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <h3 class="section-title">চ্যানেল সমূহ</h3>
        <div class="channel-grid">
            <button class="channel-btn" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">Toffee Server 1</button>
            <button class="channel-btn active" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4">Extreme 1 (4K)</button>
            <button class="channel-btn" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4">Fox One 1 (Alt)</button>
            <button class="channel-btn" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4">WC TV</button>
            <button class="channel-btn" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4">W Sports</button>
            <button class="channel-btn" data-video="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4">beIN XTRA</button>
        </div>

        <div class="notice-box">
            This TV channel is exclusively for HSC_2026 members. Please do not share this stream or website outside the community. Thank you for your cooperation.
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.channel-btn');
        const player = document.getElementById('main-player');
        const videoSource = document.getElementById('video-source');

        buttons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove 'active' status from previous button
                document.querySelector('.channel-btn.active').classList.remove('active');
                
                // Add 'active' status to clicked button
                this.classList.add('active');
                
                // Get new video stream source from 'data-video' attribute
                const newSource = this.getAttribute('data-video');
                
                // Update player and reload stream
                videoSource.src = newSource;
                player.load();
                player.play();
            });
        });
    </script>

</body>
</html>
